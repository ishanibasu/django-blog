{% extends "blog/base.html" %}

{% block title %}
Share a Post
{% endblock %}

{% block content %}

{% if sent %}

    <h1>
        E-mail successfully sent
    </h1>

    <p>
        "{{ post.title }}"
        was successfully shared.
    </p>

{% else %}

    <h1>
        Share "{{ post.title }}"
        by e-mail
    </h1>

    <form method="post">

        {{ form.as_p }}

        {% csrf_token %}

        <input
            type="submit"
            value="Send Email"
        >

    </form>

{% endif %}

{% endblock %}
