{% extends "blog/base.html" %}

{% block content %}

{% if comment %}

    <h2>
        Your comment has been added.
    </h2>

    <p>
        <a href="{{ post.get_absolute_url }}">
            Back to post
        </a>
    </p>

{% else %}

    <h2>
        Comment could not be added.
    </h2>

{% endif %}

{% endblock %}
