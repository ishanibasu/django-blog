{% extends "blog/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">

    <h2>Welcome Back 👋</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p>
        <p>

            <a href="{% url 'password_reset' %}">
            Forgot your password?
            </a>

        </p>
    </p>

</div>
{% endblock %}
