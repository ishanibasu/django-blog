{% extends "blog/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<div class="auth-container">

<h1>Forgot your password?</h1>

<p>
Enter your email address and we'll send you a password reset link.
</p>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Send Reset Link
</button>

</form>

</div>

{% endblock %}
