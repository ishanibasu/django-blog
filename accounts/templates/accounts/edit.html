{% extends "blog/base.html" %}
{% block content %}
<div class="auth-container">

    <h2>Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ user_form.as_p }}
        {{ profile_form.as_p }}

        <button type="submit">Save Changes</button>
    </form>

</div>
{% endblock %}
