{% extends "blog/base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        {{ user_form.as_p }}

        <button type="submit">Register</button>
    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>
{% endblock %}
